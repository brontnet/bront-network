# bront.conf - Bront Language Configuration
# Place in: ~/.bront.conf or /etc/bront.conf or ./bront.conf

[paths]
# Working directory for output files (per-device subdirs created here)
workdir = ./bront_work

# Log directory for session logs
logdir = ./bront_logs

# Search paths for .dspy device profiles (colon-separated)
dspy_paths = ./:~/.bront/:/etc/bront/

[options]
# Create timestamp subdirectories in workdir
timestamp_subdirs = false

# Default inventory file (if not specified on command line)
# inventory = ./inventory.yml
