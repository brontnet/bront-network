# inventory.ini - Ansible Inventory Example (INI format)
# Place in: ./ or specify with -i inventory.ini

[routers]
ROUTER1 ansible_host=192.168.1.1 ansible_network_os=iosxr
ROUTER2 ansible_host=192.168.1.2 ansible_network_os=iosxr
ROUTER3 ansible_host=192.168.1.3 ansible_network_os=ios

[routers:vars]
ansible_user=admin
ansible_password=secret
ansible_port=22

[switches]
SWITCH1 ansible_host=192.168.2.1 ansible_network_os=nxos

[switches:vars]
ansible_user=admin
ansible_password=secret

[all:vars]
# Variables applied to all hosts
